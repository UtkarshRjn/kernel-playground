name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: Web, shared & core (TypeScript)
    runs-on: ubuntu-latest
    # Dummy values so `next build` / prisma generate succeed in CI. Real values live
    # in the Vercel project env.
    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/db"
      AUTH_SECRET: "ci-dummy-secret-not-used-at-runtime"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test

  execution:
    name: Execution backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/execution
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy
      - run: pytest -q
